name: Daily MLB Model Retrain

# 1. Trigger schedule (Cron Job) a las 07:00 UTC (Aproximadamente 3 AM Hora del Este de US)
# Esto garantiza recolección justo antes de que se calculen las predicciones del nuevo día.
on:
  schedule:
    - cron: '0 7 * * *'
  # Permite disparar la accin manualmente desde la UI de Github
  workflow_dispatch: 

jobs:
  ml-retrain:
    name: Run Feedback Loop & Tune Model
    runs-on: ubuntu-latest

    steps:
      # a) Checkout del repositorio
      - name: Checkout Code
        uses: actions/checkout@v4

      # b) Setup de Python 3.10
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      # c) Instalar dependencias
      - name: Install Requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # d) Ejecutar procesos de Auditoría y Tuning con Secrets
      # =====================================================================
      # INSTRUCCIONES PARA EL USUARIO:
      # Ve a GitHub -> Repo Settings -> Secrets and variables -> Actions
      # Crea 3 secretos de repositorio:
      # - POSTGRES_USER: (tu usuario de la BD en nube, ej: postgres)
      # - POSTGRES_PASSWORD: (tu contraseña)
      # - POSTGRES_DB: (nombre de la bbdd, ej: mlb_hub)
      # Si usas una URL directa en la nube de Supabase/Neon, agrégalo también.
      # =====================================================================
      - name: Run Result Auditor (Fetch yesterday's results)
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          # Exponemos direct_url por compatibilidad
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
        run: |
          python -m services.result_auditor

      - name: Run Auto-Tuner Machine Learning (Update weights)
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
        run: |
          python -m models.auto_tuner

      # e) (Opcional) Hacer Commit al Repositorio si el JSON de pesos mutó
      # Si el Auto-Tuner escribió un mejor 'weights_config.json', empujamos ese 
      # cambio al repositorio maestro directo de forma automática.
      - name: Commit Updated Weights
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          # Verifica si hubieron modificaciones al JSON
          if [[ -n "$(git status --porcelain models/weights_config.json)" ]]; then
            git add models/weights_config.json
            git commit -m "Auto-Tuner: Updated sabermetric weights via historical feedback loop"
            git push
          else
            echo "Ningun cambio estadistico justificado para hacer push. Weights intactos."
          fi
